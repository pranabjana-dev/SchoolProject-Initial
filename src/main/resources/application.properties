# School Management System - Application Properties

server.port=${PORT:8080}

# Application name
spring.application.name=school-management

# Static resources served from /static (frontend)
spring.web.resources.static-locations=classpath:/static/

# Actuator (used by Render health checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.school=INFO
logging.pattern.console=%d{HH:mm:ss} [%level] %logger{20} - %msg%n

# Jackson config
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=NON_NULL
